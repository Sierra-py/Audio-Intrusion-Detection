audio:
  sample_rate: 22050
  window_size: 3
  overlap: 0.5
  n_mels: 128
  n_fft: 2048
  hop_length: 512
  top_db: 20

augmentation:
  noise_factor: 0.005

labels:
  wind: 0
  rain: 1
  birds: 2
  crickets: 3
  thunder: 4
  gunshots: 5
  glass_breaking: 6
  chainsaw: 7

categories:
  continuous: [wind, rain, birds, crickets, thunder]
  impulsive: [gunshots, glass_breaking, chainsaw]

training:
  batch_size: 32
  learning_rate: 0.001
  epochs: 50
  early_stopping_patience: 10
  val_split: 0.15
  test_split: 0.15
  random_seed: 42

model:
  filters: [32, 64, 128, 256]
  dropout: 0.5
  num_classes: 8

# kafka:
#   bootstrap_servers: "localhost:9092"
#   topic: "audio-stream"

kafka:
  bootstrap_servers: d8fsapgi8gbqldq0n41g.any.us-central1.gc.prd.cloud.redpanda.com:9092
  topic: audio-stream
  sasl_mechanism: SCRAM-SHA-256
  security_protocol: SASL_SSL